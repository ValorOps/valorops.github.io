name: Discord Blog Notification

on:
  push:
    branches:
      - main
    paths:
      - 'blog/*.html'
      - '!blog/index.html'
  
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send a test notification'
        required: true
        default: 'true'
        type: boolean

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get new blog posts
        id: new-posts
        run: |
          # If manual trigger with test mode, skip file detection
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.test_mode }}" == "true" ]; then
            echo "Test mode enabled - skipping file detection"
            echo "has_new_posts=false" >> $GITHUB_OUTPUT
            echo "test_mode=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "test_mode=false" >> $GITHUB_OUTPUT
          
          # Get list of added HTML files in blog/ directory (excluding index.html)
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'blog/*.html' | grep -v 'blog/index.html' || true)
          
          if [ -z "$NEW_FILES" ]; then
            echo "No new blog posts detected"
            echo "has_new_posts=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "New blog posts found:"
          echo "$NEW_FILES"
          echo "has_new_posts=true" >> $GITHUB_OUTPUT
          
          BLOG_FILE=$(echo "$NEW_FILES" | head -n 1)
          echo "blog_file=$BLOG_FILE" >> $GITHUB_OUTPUT
          
          BLOG_SLUG=$(basename "$BLOG_FILE" .html)
          echo "blog_slug=$BLOG_SLUG" >> $GITHUB_OUTPUT

      - name: Extract blog metadata
        if: steps.new-posts.outputs.has_new_posts == 'true'
        id: metadata
        run: |
          BLOG_FILE="${{ steps.new-posts.outputs.blog_file }}"
          
          TITLE=$(grep -oP '(?<=<title>).*?(?=</title>)' "$BLOG_FILE" | sed 's/ - Dillan Valor$//' | head -n 1)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          
          DESCRIPTION=$(grep -oP '(?<=<meta name="description" content=").*?(?=">)' "$BLOG_FILE" | head -n 1)
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          
          DATE=$(grep -oP '(?<=</svg>\s{0,10})[A-Z][a-z]+ [0-9]{1,2}, [0-9]{4}' "$BLOG_FILE" | head -n 1)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          
          TAGS=$(grep -oP '(?<=<span class="blog-tag">).*?(?=</span>)' "$BLOG_FILE" | tr '\n' ',' | sed 's/,$//' | head -c 200)
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Send Discord notification
        if: steps.new-posts.outputs.has_new_posts == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BLOG_TITLE: ${{ steps.metadata.outputs.title }}
          BLOG_DESCRIPTION: ${{ steps.metadata.outputs.description }}
          BLOG_DATE: ${{ steps.metadata.outputs.date }}
          BLOG_TAGS: ${{ steps.metadata.outputs.tags }}
          BLOG_SLUG: ${{ steps.new-posts.outputs.blog_slug }}
        run: |
          SITE_URL="https://valorworks.dev"
          BLOG_URL="${SITE_URL}/blog/${BLOG_SLUG}.html"
          
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "📝 New Blog Post",
              "description": "**${BLOG_TITLE}**\n\n${BLOG_DESCRIPTION}",
              "url": "${BLOG_URL}",
              "color": 5814783,
              "fields": [
                {
                  "name": "📅 Published",
                  "value": "${BLOG_DATE}",
                  "inline": true
                },
                {
                  "name": "🏷️ Tags",
                  "value": "${BLOG_TAGS}",
                  "inline": true
                }
              ],
              "footer": {
                "text": "valorworks.dev"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"
          
          echo "Discord notification sent for: $BLOG_TITLE"

      - name: Send test notification
        if: steps.new-posts.outputs.test_mode == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "🧪 Test Notification",
              "description": "**Your Discord webhook is working!**\n\nThis is a test message from your GitHub Actions workflow. When you add a new blog post, you'll see a notification like this with the actual post details.",
              "url": "https://valorworks.dev/blog",
              "color": 5763719,
              "fields": [
                {
                  "name": "📅 Published",
                  "value": "Test Date",
                  "inline": true
                },
                {
                  "name": "🏷️ Tags",
                  "value": "test, workflow, discord",
                  "inline": true
                }
              ],
              "footer": {
                "text": "valorworks.dev • Test Mode"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          EOF
          )
          
          curl -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"
          
          echo "Test notification sent successfully!"
